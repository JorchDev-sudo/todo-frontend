<!DOCTYPE html>
<html>
<head>
    <title>To-do</title>
</head>
<body>
    <H1>Frontend de to-do API</H1>
    <div id="app"></div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Description</th>
                <th>Status</th>
                <th>Created at: </th>
            </tr>
        </thead>
        <tbody id="tasksTableBody"></tbody>

    <div>
        <button id="prevPage">Anterior</button>
        <span id="pageInfo"></span>
        <button id="nextPage">Siguiente</button>
    </div>
    
    <script src="./js/app.js" type="module"></script>
</body>
</html>
